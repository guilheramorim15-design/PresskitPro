<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar minha Homepage — PressKit PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --brand: #D85A30;
  --brand-dark: #993C1D;
  --brand-glow: rgba(216,90,48,0.15);
  --bg: #0b0b0b;
  --bg2: #131313;
  --bg3: #1a1a1a;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0ede8;
  --muted: rgba(240,237,232,0.5);
  --hint: rgba(240,237,232,0.25);
  --success: #4ade80;
  --radius: 12px;
  --radius-sm: 8px;
}
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }
.bg-glow { position: fixed; top: -30vh; left: 50%; transform: translateX(-50%); width: 900px; height: 600px; background: radial-gradient(ellipse, rgba(216,90,48,0.1) 0%, transparent 65%); pointer-events: none; z-index: 0; }
header { position: sticky; top: 0; z-index: 100; background: rgba(11,11,11,0.92); backdrop-filter: blur(12px); border-bottom: 0.5px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
.logo em { color: var(--brand); font-style: normal; }
.step-counter { font-size: 12px; color: var(--muted); letter-spacing: .5px; }
.progress-track { position: sticky; top: 57px; z-index: 99; background: var(--bg2); border-bottom: 0.5px solid var(--border); padding: 0 2rem; }
.progress-steps { max-width: 760px; margin: 0 auto; display: flex; align-items: stretch; }
.pstep { flex: 1; padding: 12px 0; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; position: relative; transition: opacity .2s; opacity: .4; }
.pstep.active, .pstep.done { opacity: 1; }
.pstep::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: transparent; transition: background .3s; }
.pstep.active::after { background: var(--brand); }
.pstep.done::after { background: rgba(216,90,48,.4); }
.pstep-num { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--muted); transition: all .2s; }
.pstep.active .pstep-num { border-color: var(--brand); color: var(--brand); background: rgba(216,90,48,.1); }
.pstep.done .pstep-num { border-color: var(--brand); background: var(--brand); color: #fff; }
.pstep-label { font-size: 10px; letter-spacing: .5px; text-transform: uppercase; color: var(--muted); }
.pstep.active .pstep-label { color: var(--brand); }
main { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 3rem 2rem 6rem; }
.panel { display: none; }
.panel.active { display: block; animation: fadeUp .3s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.panel-header { margin-bottom: 2.5rem; }
.panel-tag { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--brand); margin-bottom: .5rem; display: flex; align-items: center; gap: 8px; }
.panel-tag::before { content: ''; width: 20px; height: 1px; background: var(--brand); }
.panel-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; line-height: 1.1; margin-bottom: .5rem; }
.panel-sub { font-size: 14px; color: var(--muted); }
.fg { margin-bottom: 1.25rem; }
.fg label { display: block; font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 7px; }
.fg .req { color: var(--brand); margin-left: 2px; }
.fg input, .fg textarea, .fg select { width: 100%; padding: 12px 16px; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color .15s, background .15s; resize: vertical; }
.fg input:focus, .fg textarea:focus { border-color: var(--brand); background: rgba(216,90,48,.04); }
.fg .hint { font-size: 11px; color: var(--hint); margin-top: 5px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.full { grid-column: 1 / -1; }
.social-grid { display: flex; flex-direction: column; gap: .75rem; margin-bottom: 1.25rem; }
.srow { display: flex; align-items: center; gap: 10px; }
.sbadge { width: 38px; height: 38px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; }
.style-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: .75rem; margin-bottom: 1.25rem; }
.scard { border: 1.5px solid var(--border2); border-radius: var(--radius-sm); overflow: hidden; cursor: pointer; transition: border-color .15s, transform .15s; }
.scard.sel { border-color: var(--brand); }
.scard-preview { height: 64px; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 11px; letter-spacing: 2px; }
.sp-dark { background: #0d0d0d; color: #f0ede8; }
.sp-neon { background: #07031a; color: #00ffcc; }
.sp-minimal { background: #f7f5f0; color: #111; }
.sp-sunset { background: linear-gradient(135deg,#1f0800,#0d0d0d); color: #ff7043; }
.sp-chrome { background: #080c18; color: #a0b4ff; }
.sp-colorful { background: linear-gradient(135deg,#0d1a0d,#0d0d0d); color: #a8ff78; }
.scard-label { font-size: 12px; font-weight: 500; color: var(--text); padding: 7px 10px; background: var(--bg2); }
.btn-add-ref { background: transparent; border: 0.5px dashed var(--border2); color: var(--muted); padding: 9px 16px; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; width: 100%; margin-bottom: 1.25rem; }
.nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 2.5rem; padding-top: 2rem; border-top: 0.5px solid var(--border); }
.btn-back { background: transparent; border: 0.5px solid var(--border2); color: var(--muted); padding: 11px 22px; border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; }
.btn-next, .btn-submit { background: var(--brand); color: #fff; border: none; padding: 11px 28px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 8px; }
.btn-submit { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; padding: 13px 32px; }
.review-block { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
.review-block h3 { font-family: 'Syne', sans-serif; font-size: 13px; color: var(--brand); text-transform: uppercase; margin-bottom: 1rem; border-bottom: 0.5px solid var(--border); padding-bottom: 0.5rem; }
.review-row { display: flex; gap: 1rem; margin-bottom: .6rem; font-size: 13px; }
.review-row .rlabel { color: var(--muted); min-width: 120px; }
#screen-success { display: none; text-align: center; padding: 4rem 2rem; }
#screen-success.active { display: block; }
.success-icon { width: 72px; height: 72px; border-radius: 50%; background: rgba(74,222,128,.1); border: 1.5px solid #4ade80; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 1.5rem; }
@media (max-width: 560px) { .grid2 { grid-template-columns: 1fr; } .pstep-label { display: none; } }
</style>
</head>
<body>
<div class="bg-glow"></div>
<header>
  <div class="logo">Press<em>Kit</em> <span style="font-family:'DM Sans';font-weight:300;font-size:14px;color:var(--muted)">PRO</span></div>
  <div class="step-counter" id="step-counter">Passo 1 de 5</div>
</header>

<div class="progress-track">
  <div class="progress-steps">
    <div class="pstep active" id="pt1" onclick="jumpTo(1)"><div class="pstep-num">1</div><div class="pstep-label">Identidade</div></div>
    <div class="pstep" id="pt2" onclick="jumpTo(2)"><div class="pstep-num">2</div><div class="pstep-label">Contato</div></div>
    <div class="pstep" id="pt3" onclick="jumpTo(3)"><div class="pstep-num">3</div><div class="pstep-label">Redes</div></div>
    <div class="pstep" id="pt4" onclick="jumpTo(4)"><div class="pstep-num">4</div><div class="pstep-label">Visual</div></div>
    <div class="pstep" id="pt5" onclick="jumpTo(5)"><div class="pstep-num">5</div><div class="pstep-label">Revisão</div></div>
  </div>
</div>

<main id="form-main">
  <div class="panel active" id="p1">
    <div class="panel-header">
      <div class="panel-tag">Passo 1</div>
      <div class="panel-title">Sua identidade artística</div>
    </div>
    <div class="grid2">
      <div class="fg"><label>Nome completo <span class="req">*</span></label><input type="text" id="f-nome" /></div>
      <div class="fg"><label>Nome artístico <span class="req">*</span></label><input type="text" id="f-nomeArtistico" /></div>
      <div class="fg"><label>Cidade / Estado <span class="req">*</span></label><input type="text" id="f-local" /></div>
      <div class="fg"><label>Estilo musical <span class="req">*</span></label><input type="text" id="f-estilo" /></div>
      <div class="fg full"><label>Bio <span class="req">*</span></label><textarea id="f-bio" rows="4"></textarea></div>
      <div class="fg full"><label>Conquistas</label><textarea id="f-conquistas" rows="2"></textarea></div>
      <div class="fg"><label>Início</label><input type="text" id="f-inicio" /></div>
    </div>
    <div class="nav-row"><span></span><button class="btn-next" onclick="goTo(2)">Próximo →</button></div>
  </div>

  <div class="panel" id="p2">
    <div class="panel-header"><div class="panel-tag">Passo 2</div><div class="panel-title">Contato & mídia</div></div>
    <div class="grid2">
      <div class="fg"><label>WhatsApp <span class="req">*</span></label><input type="text" id="f-whatsapp" /></div>
      <div class="fg"><label>E-mail <span class="req">*</span></label><input type="email" id="f-email" /></div>
      <div class="fg full"><label>Link Press Kit atual</label><input type="url" id="f-presskit" /></div>
      <div class="fg"><label>Link fotos</label><input type="url" id="f-fotos" /></div>
      <div class="fg"><label>Link vídeos</label><input type="url" id="f-videos" /></div>
    </div>
    <div class="nav-row"><button class="btn-back" onclick="goTo(1)">← Voltar</button><button class="btn-next" onclick="goTo(3)">Próximo →</button></div>
  </div>

  <div class="panel" id="p3">
    <div class="panel-header"><div class="panel-tag">Passo 3</div><div class="panel-title">Redes sociais</div></div>
    <div class="social-grid">
      <div class="srow"><div class="sbadge" style="background:#E1306C">IG</div><input type="url" id="s-instagram" placeholder="Link Instagram" /></div>
      <div class="srow"><div class="sbadge" style="background:#1DB954">SP</div><input type="url" id="s-spotify" placeholder="Link Spotify" /></div>
      <div class="srow"><div class="sbadge" style="background:#FF0000">YT</div><input type="url" id="s-youtube" placeholder="Link YouTube" /></div>
      <div class="srow"><div class="sbadge" style="background:#000">TK</div><input type="url" id="s-tiktok" placeholder="Link TikTok" /></div>
    </div>
    <div class="nav-row"><button class="btn-back" onclick="goTo(2)">← Voltar</button><button class="btn-next" onclick="goTo(4)">Próximo →</button></div>
  </div>

  <div class="panel" id="p4">
    <div class="panel-header"><div class="panel-tag">Passo 4</div><div class="panel-title">Visual</div></div>
    <div class="style-grid">
      <div class="scard sel" onclick="selStyle(this,'Dark Club')"><div class="scard-preview sp-dark">DARK</div><div class="scard-label">Dark Club</div></div>
      <div class="scard" onclick="selStyle(this,'Neon Rave')"><div class="scard-preview sp-neon">NEON</div><div class="scard-label">Neon Rave</div></div>
      <div class="scard" onclick="selStyle(this,'Minimal')"><div class="scard-preview sp-minimal">CLEAN</div><div class="scard-label">Minimal</div></div>
    </div>
    <div class="fg"><label>Descrição visual</label><textarea id="f-descVisual" rows="3"></textarea></div>
    <div id="ref-list" class="ref-list"><div class="ref-row"><input type="url" placeholder="Link de referência" /></div></div>
    <button class="btn-add-ref" onclick="addRef()">+ Adicionar referência</button>
    <div class="nav-row"><button class="btn-back" onclick="goTo(3)">← Voltar</button><button class="btn-next" onclick="goTo(5)">Revisar →</button></div>
  </div>

  <div class="panel" id="p5">
    <div class="panel-header"><div class="panel-tag">Passo 5</div><div class="panel-title">Revisão</div></div>
    <div class="review-block"><h3>Dados Principais</h3><div id="rev-content"></div></div>
    <div class="nav-row"><button class="btn-back" onclick="goTo(4)">← Voltar</button><button class="btn-submit" onclick="submitForm()">✦ Enviar</button></div>
  </div>
</main>

<div id="screen-success">
  <div class="success-icon">✓</div>
  <h2 id="suc-nome">Enviado!</h2>
  <p id="suc-email"></p><br>
  <button class="btn-back" onclick="location.reload()">Novo Formulário</button>
</div>

<script>
let currentStep = 1;
let selectedStyle = 'Dark Club';
const totalSteps = 5;
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwldKa7c7MlysREQ3gasMFZigp_jhuKIJ9tehiO2xwe4yhfUii8h7wvz0T4P9uHuQu75/exec";

function goTo(n) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('p' + n).classList.add('active');
  if (n === 5) buildReview();
  currentStep = n;
  updateProgress();
  window.scrollTo(0,0);
}

function jumpTo(n) { if (n <= currentStep) goTo(n); }

function updateProgress() {
  document.getElementById('step-counter').innerText = `Passo ${currentStep} de ${totalSteps}`;
  for (let i = 1; i <= 5; i++) {
    const el = document.getElementById('pt' + i);
    el.classList.remove('active', 'done');
    if (i < currentStep) el.classList.add('done');
    else if (i === currentStep) el.classList.add('active');
  }
}

function selStyle(el, name) {
  document.querySelectorAll('.scard').forEach(c => c.classList.remove('sel'));
  el.classList.add('sel');
  selectedStyle = name;
}

function addRef() {
  const row = document.createElement('div');
  row.className = 'ref-row';
  row.innerHTML = `<input type="url" placeholder="Link de referência" style="margin-top:5px; width:100%; padding:10px; background:#131313; border:0.5px solid rgba(255,255,255,0.13); color:#fff; border-radius:8px;" />`;
  document.getElementById('ref-list').appendChild(row);
}

function v(id) { return (document.getElementById(id)?.value || '').trim(); }

function collectAll() {
  const refs = [...document.querySelectorAll('#ref-list input')].map(i => i.value).filter(Boolean);
  return {
    nome: v('f-nome'), nomeArtistico: v('f-nomeArtistico'), local: v('f-local'), estilo: v('f-estilo'),
    bio: v('f-bio'), conquistas: v('f-conquistas'), inicio: v('f-inicio'), whatsapp: v('f-whatsapp'),
    email: v('f-email'), presskit: v('f-presskit'), fotos: v('f-fotos'), videos: v('f-videos'),
    instagram: v('s-instagram'), spotify: v('s-spotify'), youtube: v('s-youtube'), tiktok: v('s-tiktok'),
    estiloVisual: selectedStyle, descVisual: v('f-descVisual'), referencias: refs.join(' | '),
    enviadoEm: new Date().toLocaleString('pt-BR')
  };
}

function buildReview() {
  const d = collectAll();
  document.getElementById('rev-content').innerHTML = `
    <p><b>Artista:</b> ${d.nomeArtistico}</p>
    <p><b>E-mail:</b> ${d.email}</p>
    <p><b>WhatsApp:</b> ${d.whatsapp}</p>
    <p><b>Estilo:</b> ${d.estilo}</p>
  `;
}

function submitForm() {
  const d = collectAll();
  if (!d.nomeArtistico || !d.email) return alert('Nome e E-mail são obrigatórios!');
  
  const btn = document.querySelector('.btn-submit');
  btn.disabled = true; btn.innerText = "Enviando...";

  fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    cache: 'no-cache',
    headers: { 'Content-Type': 'application/json
